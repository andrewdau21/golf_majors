<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a6b3a"/>
  <!-- flag pole -->
  <line x1="28" y1="10" x2="28" y2="50" stroke="#e8f0e6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- flag -->
  <polygon points="28,10 48,18 28,26" fill="#c9a227"/>
  <!-- ground arc -->
