  <!-- golf ball -->
  <circle cx="42" cy="46" r="7" fill="#e8f0e6"/>
  <circle cx="40" cy="44" r="1" fill="#ccc" opacity="0.6"/>
  <circle cx="43" cy="43" r="1" fill="#ccc" opacity="0.6"/>
  <circle cx="44" cy="46" r="1" fill="#ccc" opacity="0.6"/>
  <circle cx="41" cy="47" r="1" fill="#ccc" opacity="0.6"/>
</svg>
